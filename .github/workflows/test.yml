name: CI

on:
  workflow_call:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  unit:
    name: Unit & Component
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_test_key
      VITE_ADOPTION_FORM_URL: https://forms.gle/unit-test-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run coverage

  integration:
    name: RLS & E2E
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset database
        run: supabase db reset

      - name: Export Supabase env vars
        run: |
          ANON_KEY=$(supabase status -o env | grep '^ANON_KEY=' | cut -d= -f2-)
          SERVICE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2-)
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "E2E_SUPABASE_SERVICE_ROLE_KEY=${SERVICE_KEY}" >> $GITHUB_ENV
          echo "VITE_ADOPTION_FORM_URL=https://forms.gle/e2e-placeholder" >> $GITHUB_ENV

      - name: RLS tests (pgTAP)
        run: npm run test:rls

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: npx vite build --mode test

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL || 'admin-e2e@abrigo.test' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'AbrigoE2ETest123!' }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
